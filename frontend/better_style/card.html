<!DOCTYPE html>
<html lang=”en”>
<head>
    <meta charset=”UTF-8”>
    <meta name=”viewport” content=”width=device-width, initial-scale=1.0”>
    <style>
        /* From Uiverse.io by KSAplay */
        .card {
            Display: flex;
            Flex-direction: column;
            Align-items: center;
            Position: relative;
            Width: 220px;
            Height: 350px;
            Border-radius: 20px;
            Overflow: hidden;
            Box-shadow: 12px 12px 0px rgba(0, 0, 0, 0.1);
            Background-color: white;
        }

        /* Landscape section */
        .landscape-section {
            Position: relative;
            Width: 100%;
            Height: 70%;
            Overflow: hidden;
        }

        .landscape-section * {
            Position: absolute;
        }

        .sky {
            Width: 100%;
            Height: 100%;
            Background: rgb(247, 225, 87);
            Background: linear-gradient(
                    0deg,
                    Rgba(247, 225, 87, 1) 0%,
                    Rgba(233, 101, 148, 1) 100%
            );
        }

        .sun {
            Display: flex;
            Align-items: center;
            Justify-content: center;
            Width: 45px;
            Height: 45px;
            Border-radius: 50%;
            Background-color: white;
            Bottom: 40%;
            Left: 23%;
            Filter: drop-shadow(0px 0px 10px white);
        }

        .sun::after {
            Position: absolute;
            Content: “”;
            Width: 118%;
            Height: 118%;
            Border-radius: 50%;
            Background-color: white;
            Opacity: 0.5;
        }

        .sun::before {
            Position: absolute;
            Content: “”;
            Width: 134%;
            Height: 134%;
            Border-radius: 50%;
            Background-color: white;
            Opacity: 0.1;
        }

        .ocean {
            Overflow: hidden;
            Bottom: 0;
            Width: 100%;
            Height: 28%;
            Background: rgb(241, 192, 125);
            Background: linear-gradient(
                    0deg,
                    Rgba(241, 192, 125, 1) 0%,
                    Rgba(247, 218, 150, 1) 100%
            );
        }

        .reflection {
            Position: absolute;
            Background-color: white;
            Opacity: 0.5;
            z-index: 1;
        }

        .reflection:nth-child(1) {
            Width: 40px;
            Height: 10px;
            Clip-path: polygon(0% 0%, 100% 0%, 50% 20%);
            Top: 5%;
            Left: 32%;
        }

        .reflection:nth-child(2) {
            Width: 80px;
            Height: 15px;
            Clip-path: polygon(0% 0%, 100% 0%, 60% 20%, 40% 20%);
            Top: 15%;
            Left: 39%;
        }

        .reflection:nth-child(3) {
            Width: 60px;
            Height: 2px;
            Clip-path: polygon(0% 50%, 40% 0%, 60% 0%, 100% 50%, 60% 100%, 40% 100%);
            Top: 27%;
            Right: 15%;
        }

        .reflection:nth-child(4) {
            Width: 70px;
            Height: 2px;
            Clip-path: polygon(0% 50%, 40% 0%, 60% 0%, 100% 50%, 60% 100%, 40% 100%);
            Top: 37%;
            Right: 28%;
        }
        .reflection:nth-child(5) {
            Width: 70px;
            Height: 3px;
            Clip-path: polygon(0% 50%, 40% 0%, 60% 0%, 100% 50%, 60% 100%, 40% 100%);
            Top: 46%;
            Right: 8%;
        }

        .hill-1 {
            Right: -25%;
            Bottom: 20%;
            Width: 150px;
            Height: 40px;
            Border-radius: 50%;
            Background-color: #e6b29d;
        }

        .shadow-hill-1 {
            Right: -25%;
            Top: -30%;
            Width: 150px;
            Height: 40px;
            Border-radius: 50%;
            Background-color: #f1c7a0;
            Opacity: 1;
        }

        .hill-2 {
            Right: -36%;
            Bottom: 10%;
            Width: 150px;
            Height: 80px;
            Border-radius: 50%;
            Background-color: #c29182;
        }

        .shadow-hill-2 {
            Right: -36%;
            Top: -65%;
            Width: 150px;
            Height: 80px;
            Border-radius: 50%;
            Background-color: #e5bb96;
            Opacity: 1;
        }

        .hill-3 {
            Left: -100%;
            Bottom: -28%;
            Width: 350px;
            Height: 150px;
            Border-radius: 50%;
            Background-color: #b77873;
            z-index: 3;
        }

        .tree-1 {
            Bottom: 20%;
            Left: 3%;
            Width: 50px;
            Height: 70px;
            z-index: 3;
        }

        .tree-2 {
            Bottom: 14%;
            Left: 25%;
            Width: 50px;
            Height: 70px;
            z-index: 3;
        }

        .hill-4 {
            Right: -100%;
            Bottom: -40%;
            Width: 350px;
            Height: 150px;
            Border-radius: 50%;
            Background-color: #a16773;
            z-index: 3;
        }

        .tree-3 {
            Bottom: 10%;
            Right: 1%;
            Width: 65px;
            Height: 80px;
            z-index: 3;
        }

        .filter {
            Height: 100%;
            Width: 100%;
            Background: linear-gradient(
                    0deg,
                    Rgba(255, 255, 255, 1) 0%,
                    Rgba(255, 255, 255, 0) 40%
            );
            z-index: 5;
            opacity: 0.2;
        }

        /* Content section */
        .content-section {
            Width: 100%;
            Height: 30%;
            Display: flex;
            Flex-direction: column;
            Align-items: center;
        }

        .weather-info {
            Display: flex;
            Align-items: center;
            Justify-content: space-around;
            Position: absolute;
            Text-align: center;
            Top: 0;
            Right: 0%;
            Width: 100%;
            Padding-top: 15px;
            Color: white;
            z-index: 10;
        }

        .weather-info .left-side:not(.icon) {
            Width: 20%;
            Font-size: 11pt;
            Font-weight: 600;
            Align-self: baseline;
        }

        .icon {
            Display: flex;
            Align-items: center;
            Justify-content: center;
        }

        .icon svg {
            Width: 40px;
        }

        .weather-info .right-side {
            Display: flex;
            Flex-direction: column;
            Align-items: flex-end;
        }

        .weather-info .right-side p:nth-child(2) {
            Font-size: 9pt;
            Margin: 0;
            Padding: 0;
        }

        .weather-info .location span {
            Font-size: 11pt;
            Font-weight: 700;
            Text-transform: uppercase;
        }

        .location {
            Display: flex;
            Align-items: center;
            Justify-content: flex-end;
            Width: 100%;
            Padding: 0;
            Margin: 0;
        }

        .location svg {
            Width: 14px;
            Height: auto;
        }

        .temperature {
            Font-size: 20pt;
            Font-weight: 700;
            Line-height: 30px;
        }

        .forecast {
            Display: flex;
            Flex-direction: column;
            Align-items: center;
            Justify-content: space-evenly;
            Height: 100%;
            Width: 100%;
            Padding: 10px 25px;
        }

        .forecast > div {
            Width: 100%;
            Display: flex;
            Align-items: center;
            Justify-content: space-between;
            Color: lightslategray;
            Font-size: 9pt;
        }

        .separator {
            Width: 100%;
            Height: 2px;
            Background-color: rgb(233, 233, 233);
            Border-radius: 1px;
        }
    </style>
</head>
